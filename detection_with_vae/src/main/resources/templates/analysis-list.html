<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Анализы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6fa;
            color: #222;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #1f5fbf;
            font-weight: 700;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 22px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #e2e8f0;
            padding: 10px 12px;
            text-align: left;
        }

        th {
            background: #f8fafc;
        }

        .open-link {
            color: #1f5fbf;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Список анализов</h1>

    <nav>
        <a th:href="@{/dashboard}">Главная</a>
        <a th:href="@{/datasets}">Датасеты</a>
        <a th:href="@{/analysis}">Анализы</a>
    </nav>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Датасет</th>
                <th>Статус</th>
                <th>Дата создания</th>
                <th>Действие</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.id}"></td>
                <td th:text="${task.taskName}"></td>
                <td th:text="${task.dataset.originalFileName}"></td>
                <td th:text="${task.status}"></td>
                <td th:text="${task.createdAt}"></td>
                <td>
                    <a class="open-link" th:href="@{/analysis/{id}(id=${task.id})}">Открыть</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="6">Задач анализа пока нет</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
