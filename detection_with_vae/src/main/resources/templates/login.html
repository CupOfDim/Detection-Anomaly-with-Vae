<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6fa;
            color: #222;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 14px;
        }

        .alert-error {
            background: #fff1f1;
            color: #8b0000;
        }

        .alert-success {
            background: #eef6ff;
            color: #1d4ed8;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1f5fbf;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .footer-link {
            margin-top: 16px;
            text-align: center;
        }

        .footer-link a {
            color: #1f5fbf;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <h2>Вход</h2>

        <div class="alert alert-error" th:if="${param.error}">
            Неверный email или пароль
        </div>

        <div class="alert alert-success" th:if="${param.logout}">
            Вы вышли из системы
        </div>

        <div class="alert alert-success" th:if="${param.registered}">
            Регистрация прошла успешно
        </div>

        <form th:action="@{/login}" method="post">
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="field">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Войти</button>
        </form>

        <div class="footer-link">
            <a th:href="@{/register}">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>
</div>
</body>
</html>
