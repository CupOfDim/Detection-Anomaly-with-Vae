<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6fa;
            color: #222;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 14px;
            background: #fff1f1;
            color: #8b0000;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }

        .error {
            margin-top: 6px;
            color: #b91c1c;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1f5fbf;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .footer-link {
            margin-top: 16px;
            text-align: center;
        }

        .footer-link a {
            color: #1f5fbf;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <h2>Регистрация</h2>

        <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" th:object="${registerDto}" method="post">
            <div class="field">
                <label>Имя пользователя</label>
                <input type="text" th:field="*{username}">
                <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" th:field="*{email}">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="field">
                <label>Пароль</label>
                <input type="password" th:field="*{password}">
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="field">
                <label>Подтверждение пароля</label>
                <input type="password" th:field="*{confirmPassword}">
                <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit">Зарегистрироваться</button>
        </form>

        <div class="footer-link">
            <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>
</body>
</html>
