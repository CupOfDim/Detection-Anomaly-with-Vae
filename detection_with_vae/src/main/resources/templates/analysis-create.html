<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание анализа</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f6fa;
            color: #222;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #1f5fbf;
            font-weight: 700;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .alert-error {
            background: #fff1f1;
            color: #8b0000;
            border-left: 5px solid #dc2626;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }

        .checkbox-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .checkbox-list input {
            width: auto;
        }

        .error {
            margin-top: 6px;
            color: #b91c1c;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(240px, 1fr));
            gap: 16px 20px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: #1f5fbf;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Настройка анализа</h1>

    <nav>
        <a th:href="@{/dashboard}">Главная</a>
        <a th:href="@{/datasets}">Датасеты</a>
        <a th:href="@{/analysis}">Анализы</a>
    </nav>

    <div class="card" th:if="${errorMessage}">
        <div class="alert-error">
            <p th:text="${errorMessage}"></p>
        </div>
    </div>

    <div class="card">
        <form th:action="@{/analysis/create}" th:object="${analysisDto}" method="post">
            <input type="hidden" th:field="*{datasetId}">

            <div class="field">
                <label>Название анализа</label>
                <input type="text" th:field="*{taskName}">
                <div class="error" th:if="${#fields.hasErrors('taskName')}" th:errors="*{taskName}"></div>
            </div>

            <div class="field">
                <label>Модель анализа</label>
                <select th:field="*{modelType}">
                    <option value="DENSE_VAE">Dense VAE</option>
                    <option value="LSTM_VAE">LSTM VAE</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('modelType')}" th:errors="*{modelType}"></div>
            </div>

            <div class="field">
                <label>Временной столбец</label>
                <select th:field="*{timeColumn}">
                    <option value="">-- Выберите --</option>
                    <option th:each="col : ${preview.headers}" th:value="${col}" th:text="${col}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('timeColumn')}" th:errors="*{timeColumn}"></div>
            </div>

            <div class="field">
                <label>Признаки для анализа</label>
                <div class="checkbox-list">
                    <label th:each="col : ${preview.numericColumns}">
                        <input type="checkbox" th:field="*{featureColumns}" th:value="${col}">
                        <span th:text="${col}"></span>
                    </label>
                </div>
                <div class="error" th:if="${#fields.hasErrors('featureColumns')}" th:errors="*{featureColumns}"></div>
            </div>

            <div class="grid">
                <div class="field">
                    <label>Размер окна</label>
                    <input type="number" th:field="*{windowSize}">
                </div>

                <div class="field">
                    <label>Шаг окна</label>
                    <input type="number" th:field="*{stride}">
                </div>

                <div class="field">
                    <label>Latent dimension</label>
                    <input type="number" th:field="*{latentDim}">
                </div>

                <div class="field">
                    <label>Epochs</label>
                    <input type="number" th:field="*{epochs}">
                </div>

                <div class="field">
                    <label>Batch size</label>
                    <input type="number" th:field="*{batchSize}">
                </div>

                <div class="field">
                    <label>Threshold value</label>
                    <input type="number" step="0.0001" th:field="*{thresholdValue}">
                </div>
            </div>

            <div class="field">
                <label>
                    <input type="checkbox" th:field="*{autoThreshold}" style="width:auto; margin-right:8px;">
                    Автоматический порог
                </label>
            </div>

            <button type="submit">Создать задачу анализа</button>
        </form>
    </div>

    <div class="card">
        <h2>Информация о датасете</h2>
        <p><strong>Файл:</strong> <span th:text="${preview.fileName}"></span></p>
        <p><strong>Предполагаемый time column:</strong> <span th:text="${preview.detectedTimeColumn} ?: 'не найден'"></span></p>
        <p><strong>Доступные числовые признаки:</strong></p>
        <ul>
            <li th:each="col : ${preview.numericColumns}" th:text="${col}"></li>
        </ul>
    </div>
</div>
</body>
</html>
